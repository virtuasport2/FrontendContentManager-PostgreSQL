<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Index Page</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <script src="main.js"></script>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">LOGO</div>
      <ul class="menu">
        <li><a href="#">Menu 1</a></li>

        <div class="slide"><img src="img/image2.PNG" alt="Image 2" /></div>

      </div>
      <button class="prev">&#10094;</button>
      <button class="next">&#10095;</button>

    <!-- Card Container -->
    <section class="card-container">
<div class="card" data-target="dashboard">Dashboard</div>
<div class="card" data-target="articoli">2</div>
<div class="card" data-target="utenti">3</div>
<div class="card" data-target="statistiche">4</div>
