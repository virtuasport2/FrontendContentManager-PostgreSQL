<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Articolo</title>
    <link rel="stylesheet" href="articolo.css">
</head>
<body>
    <!-- Canvas di sfondo -->
    <canvas id="articoloCanvas"></canvas>

    <!-- Contenitore per il form dell'articolo -->
    <div class="container">
        <h1>Crea un Nuovo Articolo</h1>
        <form id="articolo-form">
            <label for="titolo">Titolo Articolo:</label>
            <input type="text" id="titolo" required><br>

            <label for="sottotitolo">Sottotitolo:</label>
            <input type="text" id="sottotitolo"><br>

            <label for="testo">Testo Articolo:</label>
            <textarea id="testo" required></textarea><br>

            <label for="categoria">Categoria:</label>
            <input type="text" id="categoria"><br>

            <button type="submit">Salva Articolo</button>
        </form>
    </div>

    <!-- Inclusione dei file JS -->
    <script src="articolo_canvas.js"></script>
    <script src="articolo.js"></script> <!-- Questo file gestisce la logica del form -->
</body>
</html>
