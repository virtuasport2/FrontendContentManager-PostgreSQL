<!doctype html>
<html lang="it">
  <head>

    <title>CMS Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>

  <body>
    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h2>CMS</h2>

        <button onclick="loadSection('articoli')">Articoli</button>

      <main class="main" id="main">

        <p>Seleziona una sezione</p>
      </main>

    <script src="/assets/config.js"></script>
    <script src="/assets/dashboard/dashboard.js"></script>
    <script src="/assets/dashboard/articoli/articoli.js"></script>
    <script src="/assets/dashboard/documenti/documenti.js"></script>
    <script src="/assets/dashboard/tipidocumento/tipidoc.js"></script>
