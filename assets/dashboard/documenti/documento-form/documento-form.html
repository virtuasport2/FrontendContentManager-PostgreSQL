<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Nuovo Documento</title>

    <!-- CSS -->
    <link rel="stylesheet" href="documento-form.css">
</head>

<body>

<div class="container">
    <h2>Nuovo Documento</h2>

    <label>Nome</label>
    <input type="text" id="nome">

    <label>Descrizione</label>
    <textarea id="descrizione"></textarea>

    <div class="row">
        <div>
            <label>Tipo</label>
            <input type="text" id="tipo">
        </div>

        <div>
            <label>Stato</label>
            <select id="stato">
                <option value="bozza">Bozza</option>
                <option value="pubblicato">Pubblicato</option>
            </select>
        </div>
    </div>

    <label>Struttura JSON</label>
    <textarea id="struttura_json"></textarea>

    <label>Tipo Documento</label>
    <select id="tipo_id"></select>

    <!-- 
    <label>Tipo Documento (ID)</label>
    <input type="number" id="tipo_id"> -->

    <button onclick="salvaDocumento()">Salva</button>
    <button onclick="tornaIndietro()">Indietro</button>
</div>

<!-- JS -->
<script src="/assets/config.js"></script>
<script src="documento-form.js"></script>

</body>
</html>
